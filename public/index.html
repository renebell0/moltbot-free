<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moltbot Dashboard | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'openclaw-bg': '#0a0a0f',
                        'openclaw-surface': '#111119',
                        'openclaw-surface-light': '#1a1a24',
                        'openclaw-primary': '#e94560',
                        'openclaw-accent': '#4ade80',
                        'openclaw-border': '#2d2d3a'
                    },
                    fontFamily: {
                        sans: ['Plus Jakarta Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0f; color: #f8f9fa; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(17, 17, 25, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .glow-red { box-shadow: 0 0 20px rgba(233, 69, 96, 0.2); }
        .scrollbar-hide::-webkit-scrollbar { width: 4px; }
        .scrollbar-hide::-webkit-scrollbar-thumb { background: #2d2d3a; border-radius: 10px; }
        .chat-scroll { scroll-behavior: smooth; }
    </style>
</head>
<body class="font-sans overflow-hidden h-screen text-slate-200">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const StatusBadge = ({ label, value, active }) => (
            <div className="flex items-center gap-2 px-3 py-1.5 rounded-lg border border-openclaw-border bg-openclaw-surface-light/30">
                <span className={`w-1.5 h-1.5 rounded-full ${active ? 'bg-openclaw-accent shadow-[0_0_8px_rgba(74,222,128,0.5)]' : 'bg-slate-600'}`}></span>
                <span className="text-[10px] uppercase font-black tracking-widest text-slate-500">{label}</span>
                <span className="text-xs font-bold text-slate-300">{value}</span>
            </div>
        );

        function App() {
            const [status, setStatus] = useState({ tools: [], conversations: 0, totalMessages: 0, storage_kb: 0 });
            const [logs, setLogs] = useState([]);
            const [chatMessages, setChatMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);
            const [activeTab, setActiveTab] = useState('overview');
            const chatEndRef = useRef(null);
            const logEndRef = useRef(null);

            useEffect(() => {
                fetchStatus();
                fetchLogs();
                const int = setInterval(() => { fetchStatus(); fetchLogs(); }, 5000);
                return () => clearInterval(int);
            }, []);

            useEffect(() => {
                chatEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [chatMessages, isTyping]);

            useEffect(() => {
                logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
            }, [logs]);

            const fetchStatus = async () => {
                try {
                    const res = await fetch('/api/status');
                    setStatus(await res.json());
                } catch (e) { console.error(e); }
            };

            const fetchLogs = async () => {
                try {
                    const res = await fetch('/api/logs');
                    const data = await res.json();
                    setLogs(data.reverse());
                } catch (e) { console.error(e); }
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!userInput.trim()) return;

                const message = userInput;
                setUserInput('');
                setChatMessages(prev => [...prev, { role: 'user', content: message }]);
                setIsTyping(true);

                try {
                    const res = await fetch('/api/chat', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: message })
                    });
                    const data = await res.json();
                    setChatMessages(prev => [...prev, { role: 'assistant', content: data.text }]);
                } catch (e) {
                    setChatMessages(prev => [...prev, { role: 'assistant', content: 'System Error: Lost connection to Agent.' }]);
                } finally {
                    setIsTyping(false);
                }
            };

            return (
                <div className="flex h-screen overflow-hidden bg-openclaw-bg">
                    {/* Sidebar */}
                    <div className="w-64 border-r border-openclaw-border flex flex-col bg-openclaw-surface p-4 hidden md:flex">
                        <div className="flex items-center gap-3 mb-10 px-2">
                            <div className="w-10 h-10 bg-openclaw-primary rounded-xl flex items-center justify-center glow-red">
                                <i className="fas fa-ghost text-white"></i>
                            </div>
                            <div>
                                <h1 className="text-sm font-black tracking-tighter uppercase">Moltbot-Free</h1>
                                <span className="text-[10px] text-openclaw-primary font-bold tracking-widest">CONTROL CENTER</span>
                            </div>
                        </div>

                        <nav className="space-y-2">
                            {[
                                { id: 'overview', icon: 'fa-layer-group', label: 'System Overview' },
                                { id: 'chat', icon: 'fa-comments', label: 'Live Agent Chat' },
                                { id: 'console', icon: 'fa-terminal', label: 'Thinking Console' },
                                { id: 'skills', icon: 'fa-puzzle-piece', label: 'Agent Skills' }
                            ].map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 p-3 rounded-xl transition-all ${
                                        activeTab === item.id ? 'bg-openclaw-primary text-white shadow-lg' : 'text-slate-500 hover:bg-openclaw-surface-light'
                                    }`}
                                >
                                    <i className={`fas ${item.icon} w-5`}></i>
                                    <span className="text-xs font-black uppercase tracking-wider">{item.label}</span>
                                </button>
                            ))}
                        </nav>
                    </div>

                    {/* Main */}
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="h-16 border-b border-openclaw-border flex items-center justify-between px-6 bg-openclaw-surface">
                            <div className="flex gap-2">
                                <StatusBadge label="Uptime" value="100%" active={true} />
                                <StatusBadge label="DB" value="D1 Synced" active={true} />
                                <StatusBadge label="Conversations" value={status.conversations} active={true} />
                            </div>
                            <div className="flex items-center gap-2">
                                <div className="w-2 h-2 bg-openclaw-accent rounded-full animate-pulse"></div>
                                <span className="text-[10px] font-bold text-openclaw-accent uppercase tracking-tighter">Live Connection</span>
                            </div>
                        </header>

                        <main className="flex-1 overflow-hidden relative">
                            {activeTab === 'overview' && (
                                <div className="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in fade-in duration-500">
                                    <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                                        <div className="relative z-10">
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">D1 Message Store</p>
                                            <p className="text-3xl font-black text-white">{status.totalMessages}</p>
                                            <p className="text-xs text-slate-400 mt-2 font-bold">Total indexed records</p>
                                        </div>
                                        <i className="fas fa-database absolute -right-6 -bottom-6 text-8xl opacity-5 text-cyan-400 group-hover:scale-110 transition-transform"></i>
                                    </div>

                                    <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                                        <div className="relative z-10">
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Active Model</p>
                                            <p className="text-xl font-black text-openclaw-primary uppercase tracking-tighter">Llama 3.3 70B</p>
                                            <p className="text-xs text-slate-400 mt-2 font-bold">@cf/meta/llama-3.3-70b-instruct</p>
                                        </div>
                                        <i className="fas fa-brain absolute -right-6 -bottom-6 text-8xl opacity-5 text-rose-500 group-hover:scale-110 transition-transform"></i>
                                    </div>

                                    <div className="glass p-6 rounded-3xl relative overflow-hidden group">
                                        <div className="relative z-10">
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mb-1">Storage Usage</p>
                                            <p className="text-3xl font-black text-white">{status.storage_kb} KB</p>
                                            <p className="text-xs text-slate-400 mt-2 font-bold">D1 SQLite Allocated Size</p>
                                        </div>
                                        <i className="fas fa-hdd absolute -right-6 -bottom-6 text-8xl opacity-5 text-yellow-500 group-hover:scale-110 transition-transform"></i>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'chat' && (
                                <div className="h-full flex flex-col bg-black/20">
                                    <div className="flex-1 overflow-y-auto p-6 space-y-4 chat-scroll scrollbar-hide">
                                        {chatMessages.length === 0 && (
                                            <div className="h-full flex flex-col items-center justify-center text-slate-600">
                                                <i className="fas fa-comments text-4xl mb-4"></i>
                                                <p className="text-xs font-black uppercase tracking-widest">Start a new agent session</p>
                                            </div>
                                        )}
                                        {chatMessages.map((m, i) => (
                                            <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in slide-in-from-bottom-2 duration-300`}>
                                                <div className={`max-w-[80%] p-4 rounded-2xl border ${
                                                    m.role === 'user' ? 'bg-openclaw-primary border-transparent text-white glow-red' : 'bg-openclaw-surface-light border-openclaw-border text-slate-200'
                                                }`}>
                                                    <p className="text-sm font-bold leading-relaxed">{m.content}</p>
                                                </div>
                                            </div>
                                        ))}
                                        {isTyping && (
                                            <div className="flex justify-start">
                                                <div className="bg-openclaw-surface-light p-4 rounded-2xl border border-openclaw-border flex gap-1">
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce"></span>
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce delay-100"></span>
                                                    <span className="w-1.5 h-1.5 bg-slate-500 rounded-full animate-bounce delay-200"></span>
                                                </div>
                                            </div>
                                        )}
                                        <div ref={chatEndRef}></div>
                                    </div>
                                    <div className="p-4 bg-openclaw-surface border-t border-openclaw-border">
                                        <form onSubmit={handleSendMessage} className="flex gap-2 max-w-4xl mx-auto">
                                            <input
                                                type="text"
                                                value={userInput}
                                                onChange={(e) => setUserInput(e.target.value)}
                                                placeholder="Ask Moltbot anything..."
                                                className="flex-1 bg-openclaw-bg border border-openclaw-border rounded-xl px-4 py-3 text-sm font-bold focus:border-openclaw-primary outline-none transition-all"
                                            />
                                            <button type="submit" className="bg-openclaw-primary px-6 rounded-xl hover:opacity-80 transition-all shadow-lg glow-red">
                                                <i className="fas fa-paper-plane text-white"></i>
                                            </button>
                                        </form>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'console' && (
                                <div className="h-full flex flex-col p-6 animate-in slide-in-from-right-4 duration-300">
                                    <div className="glass rounded-3xl flex-1 flex flex-col overflow-hidden">
                                        <div className="bg-openclaw-surface-light p-3 border-b border-openclaw-border flex items-center justify-between">
                                            <div className="flex gap-1.5">
                                                <div className="w-2.5 h-2.5 rounded-full bg-red-500/30"></div>
                                                <div className="w-2.5 h-2.5 rounded-full bg-yellow-500/30"></div>
                                                <div className="w-2.5 h-2.5 rounded-full bg-green-500/30"></div>
                                            </div>
                                            <span className="text-[10px] font-mono font-bold text-slate-500 uppercase tracking-widest">AGENT_CORE_THOUGHTS.LOG</span>
                                            <div className="w-10"></div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-4 font-mono text-xs bg-black/40 scrollbar-hide space-y-1">
                                            {logs.map(log => (
                                                <div key={log.id} className="flex gap-3 py-0.5 border-b border-white/5 hover:bg-white/5 transition">
                                                    <span className="text-slate-700 shrink-0">[{new Date(log.timestamp).toLocaleTimeString()}]</span>
                                                    <span className={`uppercase text-[9px] px-1 rounded font-black h-fit mt-0.5 border ${
                                                        log.level === 'error' ? 'bg-red-500/10 text-red-500 border-red-500/20' : 
                                                        log.level === 'info' ? 'bg-blue-500/10 text-blue-500 border-blue-500/20' : 
                                                        'bg-openclaw-accent/10 text-openclaw-accent border-openclaw-accent/20'
                                                    }`}>{log.level}</span>
                                                    <span className="text-slate-300 tracking-tight leading-tight">{log.message}</span>
                                                </div>
                                            ))}
                                            <div ref={logEndRef}></div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'skills' && (
                                <div className="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 animate-in zoom-in-95 duration-300">
                                    {status.tools.map(tool => (
                                        <div key={tool} className="glass p-8 rounded-3xl border-b-4 border-b-openclaw-primary hover:bg-openclaw-surface-light transition-all cursor-pointer">
                                            <div className="w-14 h-14 bg-slate-800 rounded-2xl flex items-center justify-center mb-6">
                                                <i className="fas fa-puzzle-piece text-openclaw-primary text-xl"></i>
                                            </div>
                                            <h4 className="font-black uppercase tracking-widest text-white mb-2">{tool}</h4>
                                            <p className="text-xs text-slate-500 font-bold leading-relaxed mb-6">Native agent skill optimized for Cloudflare Workers Free Tier. Enables autonomous recursive reasoning.</p>
                                            <div className="flex items-center justify-between pt-4 border-t border-white/5">
                                                <span className="text-[10px] font-black text-openclaw-accent uppercase tracking-[0.2em]">Active & Validated</span>
                                                <i className="fas fa-check-circle text-openclaw-accent"></i>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
