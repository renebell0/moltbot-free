<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moltbot Dashboard | Control Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'openclaw-bg': '#050508',
                        'openclaw-surface': '#0d0d14',
                        'openclaw-surface-light': '#161620',
                        'openclaw-primary': '#ff2d55',
                        'openclaw-accent': '#00f2ff',
                        'openclaw-border': '#1f1f2e'
                    },
                    fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050508; color: #f8f9fa; -webkit-font-smoothing: antialiased; }
        .glass { background: rgba(13, 13, 20, 0.7); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .glow-accent { box-shadow: 0 0 30px rgba(0, 242, 255, 0.1); }
        .glow-primary { box-shadow: 0 0 30px rgba(255, 45, 85, 0.1); }
        .scrollbar-hide::-webkit-scrollbar { width: 0px; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
    </style>
</head>
<body class="font-sans overflow-hidden h-screen text-slate-300">
    <div id="root" class="h-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence } = window.Motion;

        const Card = ({ children, className = "", delay = 0 }) => (
            <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 0.5, delay }}
                className={`glass p-6 rounded-[2rem] hover:border-openclaw-primary/30 transition-colors group relative overflow-hidden ${className}`}>
                {children}
            </motion.div>
        );

        const StatusBadge = ({ label, value, active }) => (
            <div className="flex items-center gap-2 px-4 py-2 rounded-2xl border border-openclaw-border bg-openclaw-surface-light/50 backdrop-blur-xl">
                <span className={`w-2 h-2 rounded-full ${active ? 'bg-openclaw-accent shadow-[0_0_12px_rgba(0,242,255,0.8)]' : 'bg-slate-600'}`}></span>
                <span className="text-[10px] uppercase font-black tracking-[0.1em] text-slate-500">{label}</span>
                <span className="text-xs font-bold text-slate-200">{value}</span>
            </div>
        );

        const MetricsChart = ({ data }) => {
            const chartRef = useRef(null);
            const chartInstance = useRef(null);

            useEffect(() => {
                if (!data || data.length === 0) return;
                if (chartInstance.current) chartInstance.current.destroy();
                const ctx = chartRef.current.getContext('2d');
                chartInstance.current = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: data.map((_, i) => i),
                        datasets: [{
                            label: 'Latency (ms)',
                            data: data.map(d => d.value),
                            borderColor: '#00f2ff',
                            borderWidth: 3,
                            fill: true,
                            backgroundColor: 'rgba(0, 242, 255, 0.05)',
                            tension: 0.4,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { grid: { color: '#1f1f2e' }, ticks: { color: '#475569', font: { size: 10 } } } }
                    }
                });
            }, [data]);

            if (!data || data.length === 0) return (
                <div className="h-full flex flex-col items-center justify-center border border-dashed border-slate-800 rounded-3xl text-slate-700">
                    <i className="fas fa-chart-line text-3xl mb-2 opacity-20"></i>
                    <p className="text-[10px] font-black uppercase tracking-widest">No telemetry data available yet</p>
                </div>
            );

            return <canvas ref={chartRef} />;
        };

        function App() {
            const [status, setStatus] = useState({ tools: [], conversations: 0, totalMessages: 0, available_models: [], active_model: '' });
            const [logs, setLogs] = useState([]);
            const [metrics, setMetrics] = useState([]);
            const [activeTab, setActiveTab] = useState('overview');
            const [chatMessages, setChatMessages] = useState([]);
            const [userInput, setUserInput] = useState('');
            const [isTyping, setIsTyping] = useState(false);

            useEffect(() => {
                refreshAll();
                const int = setInterval(refreshAll, 5000);
                return () => clearInterval(int);
            }, []);

            const refreshAll = async () => {
                try {
                    const [s, l, m] = await Promise.all([
                        fetch('/api/status').then(r => r.json()),
                        fetch('/api/logs').then(r => r.json()),
                        fetch('/api/metrics').then(r => r.json())
                    ]);
                    setStatus(s);
                    setLogs(l.reverse());
                    setMetrics(m);
                } catch (e) {}
            };

            const handleModelChange = async (newModel) => {
                await fetch('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: 'active_model', value: newModel }) });
                refreshAll();
            };

            const initSystem = async () => {
                await fetch('/api/init');
                refreshAll();
            };

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!userInput.trim()) return;
                const msg = userInput; setUserInput('');
                setChatMessages(p => [...p, { role: 'user', content: msg }]);
                setIsTyping(true);
                try {
                    const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ text: msg }) });
                    const data = await res.json();
                    setChatMessages(p => [...p, { role: 'assistant', content: data.text }]);
                } catch (e) {} finally { setIsTyping(false); }
            };

            return (
                <div className="flex h-screen bg-openclaw-bg text-slate-300">
                    <motion.div initial={{ x: -100, opacity: 0 }} animate={{ x: 0, opacity: 1 }}
                        className="w-72 border-r border-openclaw-border flex flex-col bg-openclaw-surface/50 backdrop-blur-3xl p-6 hidden lg:flex">
                        <div className="flex items-center gap-4 mb-12 px-2 animate-float">
                            <div className="w-12 h-12 bg-gradient-to-br from-openclaw-primary to-purple-600 rounded-2xl flex items-center justify-center glow-primary">
                                <i className="fas fa-brain text-white text-xl"></i>
                            </div>
                            <div>
                                <h1 className="text-lg font-black tracking-tighter text-white uppercase">Moltbot<span className="text-openclaw-primary">.</span>OS</h1>
                                <span className="text-[10px] font-black text-slate-500 tracking-[0.3em] uppercase">Enterprise v2.0</span>
                            </div>
                        </div>
                        <nav className="space-y-3">
                            {[
                                { id: 'overview', icon: 'fa-chart-pie', label: 'Analytics' },
                                { id: 'chat', icon: 'fa-comment-dots', label: 'Agent Hub' },
                                { id: 'console', icon: 'fa-microchip', label: 'Kernel Logs' }
                            ].map(item => (
                                <motion.button whileHover={{ x: 5 }} whileTap={{ scale: 0.95 }} key={item.id} onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-4 p-4 rounded-2xl transition-all relative overflow-hidden ${activeTab === item.id ? 'bg-openclaw-primary text-white shadow-2xl glow-primary' : 'hover:bg-white/5 text-slate-500'}`}>
                                    <i className={`fas ${item.icon} text-sm`}></i>
                                    <span className="text-[11px] font-black uppercase tracking-widest">{item.label}</span>
                                </motion.button>
                            ))}
                        </nav>
                        <div className="mt-auto p-4 bg-openclaw-surface-light/30 rounded-3xl border border-white/5">
                            <p className="text-[9px] font-black text-slate-600 uppercase mb-3 text-center">System Control</p>
                            <button onClick={initSystem} className="w-full bg-openclaw-accent/10 border border-openclaw-accent/20 text-openclaw-accent text-[9px] font-black uppercase py-2 rounded-xl hover:bg-openclaw-accent/20 transition-all">Initialize Kernel</button>
                        </div>
                    </motion.div>

                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="h-20 border-b border-openclaw-border flex items-center justify-between px-8 bg-openclaw-surface/30 backdrop-blur-xl">
                            <div className="flex gap-3">
                                <StatusBadge label="Kernel" value="Stable" active={true} />
                                <StatusBadge label="Uptime" value="100%" active={true} />
                            </div>
                            <motion.div whileHover={{ scale: 1.02 }} className="flex items-center gap-3 bg-openclaw-bg border border-openclaw-border p-1.5 pl-4 rounded-2xl">
                                <span className="text-[10px] font-black text-slate-500 uppercase">AI Engine</span>
                                <select value={status.active_model} onChange={(e) => handleModelChange(e.target.value)}
                                    className="bg-openclaw-surface-light border-none rounded-xl text-[10px] font-black uppercase px-3 py-2 outline-none text-openclaw-accent cursor-pointer">
                                    {status.available_models.map(m => <option key={m.id} value={m.id}>{m.name}</option>)}
                                </select>
                            </motion.div>
                        </header>

                        <main className="flex-1 p-8 overflow-hidden relative">
                            <AnimatePresence mode="wait">
                                {activeTab === 'overview' && (
                                    <motion.div key="overview" initial={{ opacity: 0, scale: 0.98 }} animate={{ opacity: 1, scale: 1 }} exit={{ opacity: 0, scale: 1.02 }} className="h-full grid grid-cols-12 grid-rows-6 gap-6">
                                        <Card className="col-span-12 lg:col-span-8 row-span-4 flex flex-col">
                                            <div className="flex justify-between items-start mb-8">
                                                <div><h3 className="text-xl font-black text-white tracking-tighter uppercase">Latency Telemetry</h3><p className="text-xs text-slate-500 font-bold">Real-time inference performance (ms)</p></div>
                                                <div className="text-right">
                                                    <p className="text-2xl font-black text-openclaw-accent tracking-tighter">{metrics.length > 0 ? Math.round(metrics[metrics.length-1].value) : 0}ms</p>
                                                    <p className="text-[10px] font-black text-slate-600 uppercase">Avg Response</p>
                                                </div>
                                            </div>
                                            <div className="flex-1 min-h-0"><MetricsChart data={metrics} /></div>
                                        </Card>
                                        <Card className="col-span-12 lg:col-span-4 row-span-2" delay={0.1}>
                                            <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Message Store</p>
                                            <p className="text-4xl font-black text-white tracking-tighter">{status.totalMessages}</p>
                                            <p className="text-[9px] font-black text-slate-600 uppercase mt-4">Database: Cloudflare D1</p>
                                        </Card>
                                        <Card className="col-span-12 lg:col-span-4 row-span-2" delay={0.2}>
                                            <p className="text-[10px] font-black text-slate-500 uppercase mb-2">Active Channels</p>
                                            <p className="text-4xl font-black text-white tracking-tighter">{status.conversations}</p>
                                            <div className="mt-4 flex gap-2"><i className="fab fa-telegram text-openclaw-accent"></i> <i className="fas fa-globe text-slate-600"></i></div>
                                        </Card>
                                    </motion.div>
                                )}

                                {activeTab === 'chat' && (
                                    <motion.div key="chat" initial={{ opacity: 0, x: 20 }} animate={{ opacity: 1, x: 0 }} className="h-full flex flex-col glass rounded-[2.5rem] overflow-hidden">
                                        <div className="flex-1 overflow-y-auto p-8 space-y-6 scrollbar-hide">
                                            {chatMessages.length === 0 && (
                                                <div className="h-full flex flex-col items-center justify-center opacity-20">
                                                    <i className="fas fa-terminal text-6xl mb-4"></i>
                                                    <p className="text-xs font-black uppercase tracking-[0.5em]">Kernel Standing By</p>
                                                </div>
                                            )}
                                            {chatMessages.map((m, i) => (
                                                <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                                                    <div className={`max-w-[70%] p-5 rounded-3xl text-sm font-bold border ${m.role === 'user' ? 'bg-openclaw-primary border-transparent text-white glow-primary' : 'bg-openclaw-surface-light border-white/5 text-slate-200'}`}>
                                                        {m.content}
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="p-6 bg-openclaw-surface/50 border-t border-white/5">
                                            <form onSubmit={handleSendMessage} className="flex gap-4 max-w-5xl mx-auto bg-openclaw-bg p-2 rounded-[2rem] border border-white/5">
                                                <input value={userInput} onChange={e => setUserInput(e.target.value)} placeholder="Send command..." className="flex-1 bg-transparent px-6 py-3 outline-none font-bold text-sm" />
                                                <button type="submit" className="w-12 h-12 bg-openclaw-primary rounded-2xl text-white shadow-lg"><i className="fas fa-arrow-up"></i></button>
                                            </form>
                                        </div>
                                    </motion.div>
                                )}

                                {activeTab === 'console' && (
                                    <motion.div key="console" initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} className="h-full glass rounded-[2.5rem] p-8 flex flex-col">
                                        <div className="flex items-center justify-between mb-6">
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-500">Live Kernel Thoughts</h3>
                                            <div className="flex gap-1"><div className="w-2 h-2 rounded-full bg-red-500/20"></div><div className="w-2 h-2 rounded-full bg-yellow-500/20"></div><div className="w-2 h-2 rounded-full bg-green-500/20"></div></div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto font-mono text-[11px] space-y-2 scrollbar-hide bg-black/20 p-6 rounded-3xl">
                                            {logs.length === 0 && <p className="text-slate-700 animate-pulse">Initializing pensamiento recursivo...</p>}
                                            {logs.map(log => (
                                                <div key={log.id} className="flex gap-4 border-l border-slate-800 pl-4 py-1">
                                                    <span className="text-slate-600 shrink-0">[{new Date(log.timestamp).toLocaleTimeString()}]</span>
                                                    <span className={`uppercase text-[9px] font-black h-fit px-1 rounded ${log.level === 'error' ? 'text-red-500' : log.level === 'info' ? 'text-openclaw-accent' : 'text-green-500'}`}>{log.level}</span>
                                                    <span className="text-slate-400">{log.message}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </motion.div>
                                )}
                            </AnimatePresence>
                        </main>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
